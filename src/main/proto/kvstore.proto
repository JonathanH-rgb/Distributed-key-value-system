syntax = "proto3";

option java_package = "com.kvstore.proto";
option java_outer_classname = "KVStoreProto";

package kvstore;

message GetRequest{
  string key = 1;
}

message GetResponse{
  string key = 1;
  bytes value = 2;
  bool found = 3;
  int64 version = 4;
}

message PutRequest{
  string key = 1;
  bytes value = 2;
  int64 version = 3;
}

message PutResponse{
  bool successful = 1;
  string errorCode = 2;
}

message DeleteRequest{
  string key = 1;
}

message DeleteResponse{
  bool successful = 1;
  string errorCode = 2;
}

message Node{
  string host=1;
  int32 port=2;
}

//For servers to talk
message GossipRequest{
  repeated NodeInformation nodes = 1;
}

message GossipResponse{
  repeated NodeInformation nodes = 1;
}

enum NodeStatus{
  ALIVE=0;
  DEAD=1;
  SUSPECT=2;
}

message NodeInformation{
  Node node = 1;
  NodeStatus status = 2;
  int64 heartBeatCounter = 3;
}

message ClusterViewRequest{
}

message ClusterViewResponse{
  repeated NodeInformation nodes = 1;
}

service KVStore {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Gossip(GossipRequest) returns (GossipResponse);
  rpc ViewCluster(ClusterViewRequest) returns (ClusterViewResponse);
}
